[phases.setup]
nixPkgs = ["php81", "php81Packages.composer", "nodejs-18_x"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-dev"]

[phases.build]
cmds = ["npm install && npm run build"]

[start]
cmd = "mkdir -p database && touch database/database.sqlite && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
